name: JIRA Bug to GitHub Copilot Automation

on:  
  # JIRA Automation에서 webhook으로 트리거
  repository_dispatch:
    types: [jira-bug-created]
  
  # 수동 트리거도 가능하도록 설정
  workflow_dispatch:
    inputs:
      jira_issue_key:
        description: 'JIRA Issue Key (e.g., PX-12345)'
        required: true
        type: string

env:
  JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
  JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
  JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

jobs:
  create-github-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write     
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Create GitHub Issue and Assign to Copilot
        uses: actions/github-script@v7
        env:
          JIRA_BASE_URL: ${{ env.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ env.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ env.JIRA_API_TOKEN }}
        with:
          github-token: ${{ secrets.TOKEN_JENKINS }}
          script: |
            const script = require('./.github/scripts/create-github-issue.js');
            const jiraKey = "${{ github.event.client_payload.jira_issue_key || inputs.jira_issue_key }}";
            
            // Set environment variable for the script
            process.env.JIRA_ISSUE_KEY = jiraKey;
            
            // Execute the script
            return await script({github, context, core});